<div class="top-bar">
  <div class="top-left">
    <span id="current-date">{{ site.time | date: '%A, %d de %B de %Y' }}</span>
    <span>San Juan, PR</span>
    <span id="san-juan-temp">82°F</span>
  </div>
</div>
<header>
  <div class="brand-area" data-search>
    <a class="logo-box" href="{{ '/' | relative_url }}">
      <img src="https://theborinquenpost.wordpress.com/wp-content/uploads/2026/05/the-borinquen-post.jpeg" alt="The Borinquen Post">
    </a>
    <button class="search-toggle" id="search-open" type="button" aria-expanded="false" aria-controls="news-search-overlay" aria-label="Abrir buscador de noticias">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M10.5 3a7.5 7.5 0 1 1-4.727 13.32L2.5 19.593 4.407 21.5l3.273-3.273A7.5 7.5 0 0 1 10.5 3Zm0 2.2a5.3 5.3 0 1 0 0 10.6 5.3 5.3 0 0 0 0-10.6Z"/></svg>
    </button>
  </div>
</header>
