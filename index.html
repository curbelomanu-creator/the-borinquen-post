---
layout: default
title: Inicio
---
<section class="section-title"><h2>Últimas noticias</h2></section>
<div class="grid">
  {% for post in site.posts limit: 9 %}
  <article class="card">
    {% if post.image %}<img src="{{ post.image | relative_url }}" alt="{{ post.title }}">{% endif %}
    <div class="category">{{ post.category }}</div>
    <h3><a href="{{ post.url | relative_url }}">{{ post.title }}</a></h3>
    {% if post.excerpt %}<p class="excerpt">{{ post.excerpt | strip_html | truncate: 160 }}</p>{% endif %}
    <div class="meta">{{ post.date | date: '%d %b %Y' }}</div>
  </article>
  {% endfor %}
</div>
